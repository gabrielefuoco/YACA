name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # We don't want LFS, we want to skip binaries

      - name: Force Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          # Configuriamo l'identità Git
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

          # Configurazioni per prevenire disconnessioni in fase di push
          git config --global http.postBuffer 1048576000
          git config --global http.version HTTP/1.1

          # Aggiungiamo il remote con il token integrato
          git remote add hf "https://Gabriele-fuoco:${HF_TOKEN}@huggingface.co/spaces/Gabriele-fuoco/YACA" || git remote set-url hf "https://Gabriele-fuoco:${HF_TOKEN}@huggingface.co/spaces/Gabriele-fuoco/YACA"

          echo "Avvio il push forzato verso Hugging Face..."

          # Eseguiamo un force push diretto (sovrascrive HF con il contenuto di GitHub)
          # -c protocol.version=0 previene gli errori "acknowledgments"
          git -c protocol.version=0 push -f hf main
