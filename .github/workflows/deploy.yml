name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # We don't want LFS, we want to skip binaries

      - name: Clean and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configuriamo l'identità Git
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          # Rimuoviamo la vecchia cronologia Git che contiene i file binari pesanti
          rm -rf .git
          
          # Inizializziamo un nuovo repository pulito
          git init
          git checkout -b main
          
          # Aggiungiamo solo i file non ignorati dal .gitignore aggiornato
          git add .
          git commit -m "Deploy clean version: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # Push forzato verso Hugging Face (solo i file correnti)
          git push --force https://Gabriele-fuoco:$HF_TOKEN@huggingface.co/spaces/Gabriele-fuoco/YACA main
