name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # We don't want LFS, we want to skip binaries

      - name: Clean and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          # Configuriamo l'identità Git
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

          # Push incrementale verso Hugging Face mantenendo la cronologia
          git remote add hf https://huggingface.co/spaces/Gabriele-fuoco/YACA || git remote set-url hf https://huggingface.co/spaces/Gabriele-fuoco/YACA
          HF_AUTH="$(printf 'Gabriele-fuoco:%s' "$HF_TOKEN" | base64 | tr -d '\n')"
          hf_git() {
            # Hugging Face Git HTTP è più stabile con protocol.version=0 durante fetch/push autenticati
            git -c protocol.version=0 -c http.https://huggingface.co/.extraheader="authorization: Basic $HF_AUTH" "$@"
          }
          retry_hf_git() {
            local attempt=1
            local max_attempts=3
            local exit_code=0
            while true; do
              hf_git "$@"
              exit_code=$?
              if [ "$exit_code" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$exit_code"
              fi
              echo "Command failed (attempt $attempt/$max_attempts): git $*"
              attempt=$((attempt + 1))
              sleep 2
            done
          }

          # Aggiorniamo prima la storia locale con quella remota (se presente)
          if retry_hf_git ls-remote --exit-code --heads hf main >/dev/null; then
            retry_hf_git fetch hf refs/heads/main:refs/remotes/hf/main || { echo "Unable to fetch Hugging Face main branch. Verify remote connectivity and HF_TOKEN permissions."; exit 1; }
            git merge --no-edit hf/main || { echo "Automatic merge with Hugging Face history failed. Resolve conflicts manually and rerun."; exit 1; }
          elif [ "$?" -eq 2 ]; then
            echo "Hugging Face main branch does not exist yet. Proceeding with initial push."
          else
            echo "Unable to check Hugging Face main branch. Verify remote connectivity and HF_TOKEN permissions."
            exit 1
          fi

          # Se il push viene ancora rifiutato per non-fast-forward, riallineiamo e riproviamo
          if ! retry_hf_git push hf main; then
            echo "Initial push rejected, syncing with Hugging Face remote history..."
            retry_hf_git fetch hf refs/heads/main:refs/remotes/hf/main || { echo "Unable to fetch Hugging Face main branch after rejected push. Verify remote history and permissions."; exit 1; }
            git merge --no-edit hf/main || { echo "Automatic merge with Hugging Face history failed. Resolve conflicts manually and rerun."; exit 1; }
            retry_hf_git push hf main || { echo "Push to Hugging Face failed after remote merge. Verify remote history and rerun."; exit 1; }
          fi
