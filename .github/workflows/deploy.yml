name: 🚀 Deploy YACA

# Workflow unificato: deploya CF Worker + sincronizza secrets su HF + push codice a HF Space
# Per usarlo: fork della repo → aggiungi secrets su GitHub → esegui l'action → tutto online!

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      # ════════════════════════════════════════════════════════════
      # STEP 1: Deploy Cloudflare Worker (se configurato)
      # ════════════════════════════════════════════════════════════
      - name: 🔧 Deploy Cloudflare Pages Proxy
        id: cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ℹ️ CLOUDFLARE_API_TOKEN o CLOUDFLARE_ACCOUNT_ID non configurati. Skipping CF Proxy deploy."
            echo "cf_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Creiamo un nome progetto univoco per account usando i primi 8 caratteri dell'account ID
          PROJECT_NAME="yaca-proxy-${CLOUDFLARE_ACCOUNT_ID:0:8}"
          
          # Setup directory per Cloudflare Pages (Advanced Mode: _worker.js gestisce tutto il traffico)
          mkdir -p cf-pages-deploy
          cp cloudflare/worker.js cf-pages-deploy/_worker.js
          echo "YACA Proxy is running" > cf-pages-deploy/index.html

          echo "📦 Installazione Wrangler..."
          npm install -g wrangler

          echo "🏗️ Creazione progetto Pages (ignora errori se esiste)..."
          export CI=true
          npx wrangler pages project create "$PROJECT_NAME" --production-branch main || true

          echo "🚀 Deploy del proxy su Cloudflare Pages..."
          DEPLOY_OUTPUT=$(npx wrangler pages deploy cf-pages-deploy --project-name "$PROJECT_NAME" --branch main)
          echo "$DEPLOY_OUTPUT"

          # Estrai l'URL del deploy
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^"]*\.pages\.dev' | head -1)
          
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL="https://${PROJECT_NAME}.pages.dev"
          fi

          echo "✅ CF Proxy deployato su Pages: $DEPLOY_URL"
          echo "cf_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT

      # ════════════════════════════════════════════════════════════
      # STEP 2: Sincronizza Secrets GitHub → HF Space
      # ════════════════════════════════════════════════════════════
      - name: 🔐 Sync Secrets to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          # ── Secrets dell'app da sincronizzare ──
          SECRET_MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SECRET_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SECRET_PROXY_ADDON_URL: ${{ secrets.PROXY_ADDON_URL }}
          SECRET_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_ERDB_CONFIG: ${{ secrets.ERDB_CONFIG }}
          SECRET_MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SECRET_TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          SECRET_TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          SECRET_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SECRET_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_HOST_URL: ${{ secrets.HOST_URL }}
          # ── Auto-generato dallo step precedente ──
          CF_URL: ${{ steps.cf-worker.outputs.cf_url }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ HF_TOKEN non configurato. Impossibile sincronizzare i secrets."
            exit 1
          fi

          if [ -z "$HF_SPACE_ID" ]; then
            echo "❌ HF_SPACE_ID non configurato."
            echo "   Vai su Settings → Secrets and variables → Variables → New repository variable"
            echo "   Nome: HF_SPACE_ID   Valore: il-tuo-username/YACA"
            exit 1
          fi

          API_URL="https://huggingface.co/api/spaces/${HF_SPACE_ID}/secrets"
          SYNCED=0
          SKIPPED=0

          sync_secret() {
            local KEY="$1"
            local VALUE="$2"
            if [ -n "$VALUE" ]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "$API_URL" \
                -H "Authorization: Bearer ${HF_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"key\": \"${KEY}\", \"value\": \"${VALUE}\"}")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
                echo "  ✅ ${KEY}"
                SYNCED=$((SYNCED + 1))
              else
                echo "  ⚠️ ${KEY} (HTTP $STATUS)"
              fi
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          }

          echo "🔐 Sincronizzazione secrets su HF Space: ${HF_SPACE_ID}"
          echo ""

          sync_secret "MONGODB_URI" "$SECRET_MONGODB_URI"
          sync_secret "TMDB_API_KEY" "$SECRET_TMDB_API_KEY"
          sync_secret "PROXY_ADDON_URL" "$SECRET_PROXY_ADDON_URL"
          sync_secret "JWT_SECRET" "$SECRET_JWT_SECRET"
          sync_secret "ERDB_CONFIG" "$SECRET_ERDB_CONFIG"
          sync_secret "MISTRAL_API_KEY" "$SECRET_MISTRAL_API_KEY"
          sync_secret "TRAKT_CLIENT_ID" "$SECRET_TRAKT_CLIENT_ID"
          sync_secret "TRAKT_CLIENT_SECRET" "$SECRET_TRAKT_CLIENT_SECRET"
          sync_secret "CLOUDFLARE_API_TOKEN" "$SECRET_CLOUDFLARE_API_TOKEN"
          sync_secret "CLOUDFLARE_ACCOUNT_ID" "$SECRET_CLOUDFLARE_ACCOUNT_ID"
          sync_secret "HOST_URL" "$SECRET_HOST_URL"

          # CF_WORKER_URL auto-generato dal deploy su Pages
          if [ -n "$CF_URL" ]; then
            sync_secret "CF_WORKER_URL" "$CF_URL"
          fi

          echo ""
          echo "📊 Sincronizzati: $SYNCED | Saltati (non configurati): $SKIPPED"

      # ════════════════════════════════════════════════════════════
      # STEP 3: Push codice su HF Space
      # ════════════════════════════════════════════════════════════
      - name: 📦 Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "❌ HF_TOKEN o HF_SPACE_ID mancanti. Impossibile pushare."
            exit 1
          fi

          echo "🧹 Pulizia dei file non necessari..."
          rm -f frontend/lint_output.json || true

          # Estrai username dal HF_SPACE_ID (formato: username/repo)
          HF_USERNAME=$(echo "$HF_SPACE_ID" | cut -d'/' -f1)

          rm -rf .git
          git init
          git checkout -b main

          git config user.name "GitHub Action"
          git config user.email "actions@github.com"

          echo "📦 Configurazione Git LFS..."
          git lfs install
          git lfs track "*.mp4"
          git lfs track "*.png"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"

          echo "📦 Creazione pacchetto di deploy..."
          git add .gitattributes
          git add .
          git commit -m "🚀 Auto-deploy from GitHub Actions"

          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git config http.postBuffer 1048576000
          git config http.version HTTP/1.1

          echo "🚀 Push a Hugging Face Space: ${HF_SPACE_ID}..."
          git -c protocol.version=0 push -f hf main || { echo "❌ Push fallito. Verifica HF_TOKEN e HF_SPACE_ID."; exit 1; }

          echo "✅ Deploy completato su https://huggingface.co/spaces/${HF_SPACE_ID}"
