name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # We don't want LFS, we want to skip binaries

      - name: Force Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          # Configure Git identity
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

          # Configure network options to reduce Hugging Face push disconnects:
          # - high postBuffer helps with large packfiles
          # - HTTP/1.1 avoids intermittent transport/proxy issues seen with HTTP/2
          git config --global http.postBuffer 1048576000
          git config --global http.version HTTP/1.1

          # Add/update the remote with embedded token authentication
          git remote add hf "https://Gabriele-fuoco:${HF_TOKEN}@huggingface.co/spaces/Gabriele-fuoco/YACA" || git remote set-url hf "https://Gabriele-fuoco:${HF_TOKEN}@huggingface.co/spaces/Gabriele-fuoco/YACA"

          echo "Starting force push to Hugging Face..."

          # Assumption: GitHub main is the only source of truth for this Space.
          # Run direct force push (overwrites HF with GitHub content)
          # -c protocol.version=0 prevents "acknowledgments" errors
          git -c protocol.version=0 push -f hf main || { echo "Force push to Hugging Face failed. Check HF_TOKEN and remote connectivity."; exit 1; }
