name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # We don't want LFS, we want to skip binaries

      - name: Clean and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configuriamo l'identità Git
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

          # Push incrementale verso Hugging Face mantenendo la cronologia
          git remote add hf https://huggingface.co/spaces/Gabriele-fuoco/YACA || git remote set-url hf https://huggingface.co/spaces/Gabriele-fuoco/YACA
          HF_AUTH="$(printf 'Gabriele-fuoco:%s' "$HF_TOKEN" | base64 | tr -d '\n')"
          git -c http.https://huggingface.co/.extraheader="authorization: Basic $HF_AUTH" push hf main || { echo "Push to Hugging Face failed. Verify remote history and rerun."; exit 1; }
