name: Deploy Cloudflare Worker
on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/worker.js'
  workflow_dispatch:

jobs:
  deploy-cf-worker:
    runs-on: ubuntu-latest
    # Esegui solo se i secrets Cloudflare sono configurati
    if: ${{ vars.CF_DEPLOY_ENABLED != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          set -e

          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "⚠️ CLOUDFLARE_API_TOKEN o CLOUDFLARE_ACCOUNT_ID non configurati. Salta il deploy del worker."
            exit 0
          fi

          SCRIPT_NAME="yaca-proxy-worker"
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"

          echo "📤 Upload del worker '${SCRIPT_NAME}'..."
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT "${API_BASE}/workers/scripts/${SCRIPT_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/javascript" \
            --data-binary @cloudflare/worker.js)
          
          UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | tail -1)
          UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          
          if [ "$UPLOAD_STATUS" != "200" ]; then
            echo "❌ Upload fallito (HTTP $UPLOAD_STATUS):"
            echo "$UPLOAD_BODY"
            exit 1
          fi
          echo "✅ Worker uploadato con successo."

          echo "🌐 Abilitazione routing su .workers.dev..."
          ENABLE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${API_BASE}/workers/scripts/${SCRIPT_NAME}/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}')
          
          ENABLE_STATUS=$(echo "$ENABLE_RESPONSE" | tail -1)
          if [ "$ENABLE_STATUS" != "200" ]; then
            echo "⚠️ Abilitazione subdomain fallita (HTTP $ENABLE_STATUS), potrebbe essere già abilitato."
          fi

          echo "🔍 Recupero sottodominio..."
          SUB_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${API_BASE}/workers/subdomain")
          
          SUBDOMAIN=$(echo "$SUB_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('result',{}).get('subdomain',''))" 2>/dev/null || echo "")
          
          if [ -z "$SUBDOMAIN" ]; then
            echo "❌ Impossibile recuperare il sottodominio."
            exit 1
          fi

          WORKER_URL="https://${SCRIPT_NAME}.${SUBDOMAIN}.workers.dev"
          echo "✅ Worker deployato: ${WORKER_URL}"

          # Salva il sottodominio in MongoDB (se configurato)
          if [ -n "$MONGODB_URI" ]; then
            echo "💾 Salvataggio sottodominio in MongoDB..."
            # Usa Node.js one-liner per scrivere in MongoDB
            npx -y mongodb@6 --eval "
              const { MongoClient } = require('mongodb');
              (async () => {
                const client = new MongoClient('${MONGODB_URI}');
                await client.connect();
                const db = client.db();
                await db.collection('system_settings').updateOne(
                  { key: 'cf_subdomain' },
                  { \$set: { value: '${SUBDOMAIN}', updatedAt: new Date() } },
                  { upsert: true }
                );
                console.log('✅ Sottodominio salvato in MongoDB: ${SUBDOMAIN}');
                await client.close();
              })();
            " 2>/dev/null || echo "⚠️ Salvataggio MongoDB fallito (non critico)."
          fi

          echo ""
          echo "🎉 Deploy completato!"
          echo "   URL: ${WORKER_URL}"
          echo "   Subdomain: ${SUBDOMAIN}"
          echo ""
          echo "ℹ️ Se il tuo HF Space non riesce a raggungere il worker,"
          echo "   aggiungi CF_WORKER_SUBDOMAIN=${SUBDOMAIN} nei secrets dello Space."
